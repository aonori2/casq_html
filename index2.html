<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CASQ ST - Chic Ver.</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans JP', sans-serif;
      background-color: #1a1a1a;
      color: #e6e6e6;
      line-height: 1.8;
    }
    header {
      background-color: rgba(0, 0, 0, 0.8);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-weight: 700;
      font-size: 1.5rem;
      color: #ffffff;
      margin: 0;
    }
    nav a {
      color: #e6e6e6;
      margin-left: 2rem;
      text-decoration: none;
      font-weight: 300;
      transition: color 0.3s ease;
    }
    nav a:hover {
      color: #c0aa6b;
    }

    .hero {
      height: 90vh;
      background: linear-gradient(to right, #1a1a1a, #2e2e2e);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }
    .hero h2 {
      font-size: 3rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }
    .hero p {
      font-size: 1.2rem;
      max-width: 600px;
    }

    .btn {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: transparent;
      border: 1px solid #e6e6e6;
      color: #e6e6e6;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn:hover {
      background-color: #e6e6e6;
      color: #1a1a1a;
    }

    .section {
      padding: 4rem 2rem;
      background-color: #2e2e2e;
      text-align: center;
    }
    .section:nth-child(even) {
      background-color: #1a1a1a;
    }

    .section h3 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    footer {
      background-color: #111;
      text-align: center;
      padding: 2rem;
      font-size: 0.9rem;
      color: #999;
    }
  </style>
</head>
<body>

  <header>
    <h1>CASQ ST</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h2>静かに、際立つ。</h2>
    <p>洗練された美しさと、実用性を兼ね備えたプロダクト。それがCASQ STのスタイル。</p>
    <button class="btn">今すぐ見る</button>
  </section>

  <section class="section">
    <h3>ミニマルデザイン</h3>
    <p>余白とシンプルさが生む、視覚的な調和。</p>
  </section>

  <section class="section">
    <h3>上質な素材感</h3>
    <p>手触りから伝わる、確かな品質と安心感。</p>
  </section>

  <footer>
    &copy; 2025 CASQ ST. All rights reserved.
  </footer>

</body>
</html>
