<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CASQ-ST リデザイン</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Roboto', sans-serif;
      /* background: linear-gradient(135deg, #00c9a7, #005b5b); */
background: #fafafa;
background: linear-gradient(139deg, rgba(250, 250, 250, 1) 0%, rgba(146, 240, 193, 1) 100%, rgba(237, 221, 83, 1) 100%);
      color: black;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      position: relative;
    }

    header h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: slideIn 0.8s ease-out forwards;
    }

    header p {
      font-size: 1.5rem;
      max-width: 600px;
      animation: fadeIn 1.5s ease-out forwards;
      opacity: 0;
    }

    .cta-button {
      margin-top: 2rem;
      background-color: white;
      color: #00c9a7;
      padding: 1rem 2rem;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
      font-weight: bold;
    }

    .cta-button:hover {
      background-color: #00a88a;
      color: white;
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(0, 201, 167, 0.6);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .speed-lines {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(
        -45deg,
        rgba(255, 255, 255, 0.05) 0,
        rgba(255, 255, 255, 0.05) 2px,
        transparent 2px,
        transparent 6px
      );
      animation: moveLines 2s linear infinite;
      z-index: 0;
    }

    header > * {
      position: relative;
      z-index: 1;
    }

    @keyframes moveLines {
      from {
        background-position: 0 0;
      }
      to {
        background-position: 100px 100px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="speed-lines"></div>
    <h1>スピード × 革新のスタンダード</h1>
    <p>CASQ-STは、次世代のWebサービス開発を支える最先端の技術プラットフォームです。</p>
    <button class="cta-button">サービスを見る</button>
  </header>
</body>
</html>
